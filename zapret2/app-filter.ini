# Zapret2 App Filter Configuration
# Define which apps should use Zapret2/VPN per network type

################################################################################
# WiFi APP FILTER
################################################################################

# Enable app filtering on WiFi (0=disabled, 1=enabled)
WIFI_APP_FILTER=0

# Package names of apps to filter on WiFi
# Space-separated list of Android package names
WIFI_APPS="com.google.android.youtube com.discord com.telegram.messenger"

################################################################################
# MOBILE APP FILTER
################################################################################

# Enable app filtering on Mobile (0=disabled, 1=enabled)
MOBILE_APP_FILTER=0

# Package names of apps to filter on Mobile (via VPN)
# Space-separated list of Android package names
MOBILE_APPS="com.google.android.youtube com.discord com.telegram.messenger"

################################################################################
# PRESET APP GROUPS
################################################################################

# Video streaming apps
VIDEO_APPS="com.google.android.youtube com.google.android.apps.youtube.music com.netflix.mediaclient"

# Messengers
MESSENGER_APPS="com.discord com.telegram.messenger com.whatsapp"

# Social media
SOCIAL_APPS="com.instagram.android com.facebook.katana com.twitter.android"

# All common apps
ALL_APPS="com.google.android.youtube com.google.android.apps.youtube.music com.discord com.discord.staff com.telegram.messenger com.telegram.messenger.web com.whatsapp com.instagram.android com.facebook.katana com.twitter.android com.netflix.mediaclient com.spotify.music"

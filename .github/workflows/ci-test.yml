name: CI Build and Test

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  test-shell-scripts:
    name: Test Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Shell Tests
        run: |
          chmod +x tests/shell/run-tests.sh
          bash tests/shell/run-tests.sh

  test-android-unit:
    name: Test Android Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Unit Tests
        run: |
          cd android-app
          ./gradlew test --no-daemon -q
